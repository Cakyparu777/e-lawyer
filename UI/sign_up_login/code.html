<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center justify-center p-margin-main">
<main class="w-full max-w-[400px] flex flex-col gap-stack-lg bg-surface-container-lowest p-stack-lg rounded-xl shadow-sm border border-outline-variant/30">

<header class="text-center flex flex-col items-center gap-stack-sm mb-stack-sm">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-stack-sm shadow-md">
<span class="material-symbols-outlined text-[32px] text-on-primary" style="font-variation-settings: 'FILL' 1;">gavel</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary">e-Lawyer</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Secure access to your legal counsel.</p>
</header>
<!-- Form -->
<form class="flex flex-col gap-stack-md" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-unit" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mail</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary transition-all" id="email" placeholder="client@example.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-unit" for="phone">Mobile Phone Number</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">smartphone</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary transition-all" id="phone" placeholder="+1 (555) 000-0000" required="" type="tel"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-sm text-label-sm text-on-surface-variant ml-unit" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-12 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary focus:border-secondary transition-all" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<div class="flex justify-end mt-[-8px]">
<button class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" type="button">Forgot Password?</button>
</div>
<button class="w-full bg-primary text-on-primary py-3 rounded-lg font-label-lg text-label-lg hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-sm mt-stack-sm flex items-center justify-center gap-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-gutter my-stack-sm">
<div class="h-[1px] bg-outline-variant flex-1"></div>
<span class="font-label-sm text-label-sm text-outline">OR CONTINUE WITH</span>

</div>
