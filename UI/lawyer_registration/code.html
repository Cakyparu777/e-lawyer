<style>
        body { -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .pt-safe { padding-top: env(safe-area-inset-top, 20px); }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col pt-safe">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-40 flex justify-between items-center px-margin-main py-stack-md bg-surface/90 backdrop-blur-lg border-b border-outline-variant">
<button class="text-on-surface-variant hover:bg-surface-container-low rounded-full p-2 transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-semibold text-primary">Registration</h1>
<div class="w-10"></div> <!-- Placeholder for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-[600px] mx-auto px-margin-main py-stack-lg pb-32">
<!-- Progress Indicator -->
<div class="mb-stack-lg flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-lg text-label-lg">1</div>
<div class="w-12 h-1 bg-surface-container-high rounded-full overflow-hidden">
<div class="w-1/2 h-full bg-primary rounded-full"></div>
</div>
<div class="w-8 h-8 rounded-full border border-outline-variant text-on-surface-variant flex items-center justify-center font-label-lg text-label-lg bg-surface">2</div>
<div class="w-12 h-1 bg-surface-container-high rounded-full"></div>
<div class="w-8 h-8 rounded-full border border-outline-variant text-on-surface-variant flex items-center justify-center font-label-lg text-label-lg bg-surface">3</div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant">Step 1 of 3</span>
</div>
<div class="space-y-stack-lg">
<section>
<h2 class="font-headline-md text-headline-md text-on-surface mb-stack-sm">Personal Information</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant mb-stack-md">Let clients know who you are and establish trust.</p>
<!-- Photo Upload -->
<div class="mb-stack-lg">
<label class="block font-label-lg text-label-lg text-on-surface mb-stack-sm">Profile Photo</label>
<div class="flex items-center gap-stack-md">
<div class="w-24 h-24 rounded-full bg-surface-container-high flex items-center justify-center border border-dashed border-outline-variant overflow-hidden relative group cursor-pointer">
<span class="material-symbols-outlined text-outline-variant text-[32px] group-hover:text-primary transition-colors">add_a_photo</span>
<input accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
<div class="flex-1">
<p class="font-body-sm text-body-sm text-on-surface-variant mb-stack-sm">Upload a professional headshot. High-quality images build immediate trust with prospective clients.</p>
<button class="px-4 py-2 rounded-lg border border-outline-variant text-secondary font-label-lg text-label-lg hover:bg-surface-container-low transition-colors">Choose File</button>
</div>
</div>
</div>
<!-- Basic Details -->
<div class="space-y-stack-md">
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-unit">Full Name</label>
<input class="w-full rounded-lg border border-outline-variant bg-surface px-4 py-3 font-body-md text-body-md text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all placeholder:text-outline" placeholder="e.g., Jane Doe, Esq." type="text"/>
</div>
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-unit">Professional Title</label>
<input class="w-full rounded-lg border border-outline-variant bg-surface px-4 py-3 font-body-md text-body-md text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all placeholder:text-outline" placeholder="e.g., Senior Partner" type="text"/>
</div>
<div>
<label class="block font-label-lg text-label-lg text-on-surface mb-unit">Professional Bio</label>
<textarea class="w-full rounded-lg border border-outline-variant bg-surface px-4 py-3 font-body-md text-body-md text-on-surface focus:border-secondary focus:ring-1 focus:ring-secondary outline-none transition-all placeholder:text-outline resize-none" placeholder="Briefly describe your experience, approach, and track record..." rows="4"></textarea>
<p class="text-right font-label-sm text-label-sm text-outline-variant mt-unit">0 / 500</p>
</div>
</div>
</section>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 p-margin-main bg-surface border-t border-outline-variant pb-safe z-50">
<div class="max-w-[600px] mx-auto flex gap-stack-md">
<button class="flex-1 py-3 px-6 rounded-lg bg-primary text-on-primary font-label-lg text-label-lg text-center hover:opacity-90 transition-opacity flex justify-center items-center gap-2">
                Continue to Expertise
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</div>
</body></html>
